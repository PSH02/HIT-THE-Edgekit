apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgekit-server
  labels:
    app: edgekit-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edgekit-server
  template:
    metadata:
      labels:
        app: edgekit-server
    spec:
      containers:
        - name: server
          image: edgekit-server:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          env:
            - name: EDGEKIT_APP_ENV
              value: "prod"
            - name: EDGEKIT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: edgekit-secrets
                  key: database-url
            - name: EDGEKIT_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: edgekit-secrets
                  key: redis-url
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: edgekit-server
spec:
  selector:
    app: edgekit-server
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: grpc
      port: 50051
      targetPort: grpc
  type: ClusterIP
